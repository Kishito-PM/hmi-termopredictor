<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI TermoPredictor V2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .panel { background-color: #1e1e1e; border-radius: 8px; padding: 15px 20px; margin-top: 15px; display: flex; align-items: center; border: 1px solid #333; }
        .led { width: 18px; height: 18px; border-radius: 50%; margin-right: 20px; background-color: #333; flex-shrink: 0; }
        
        @keyframes latidoVerde { 0%, 100% { background-color: #00ff88; box-shadow: 0 0 2px #00ff88; } 50% { background-color: #008844; box-shadow: 0 0 15px #00ff88; } }
        @keyframes latidoRojo { 0%, 100% { background-color: #ff4444; box-shadow: 0 0 2px #ff4444; } 50% { background-color: #aa0000; box-shadow: 0 0 15px #ff4444; } }
        @keyframes latidoAmarillo { 0%, 100% { background-color: #ffaa00; box-shadow: 0 0 2px #ffaa00; } 50% { background-color: #885500; box-shadow: 0 0 15px #ffaa00; } }
        @keyframes latidoAzul { 0%, 100% { background-color: #00aaff; box-shadow: 0 0 2px #00aaff; } 50% { background-color: #004488; box-shadow: 0 0 10px #00aaff; } }

        .led-verde { animation: latidoVerde 2s infinite; }
        .led-rojo { animation: latidoRojo 1s infinite; }
        .led-amarillo { animation: latidoAmarillo 2s infinite; }
        .led-azul { animation: latidoAzul 2s infinite; }

        .info-container { display: flex; flex-direction: column; }
        .dato { font-family: monospace; color: #dddddd; font-size: 1.1em; margin-top: 4px; }
        button { border: none; padding: 15px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .btn-standby { background-color: #444444; color: #fff; }
        .btn-conectado { background-color: #2a2a2a; color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <h2>⚡ Diagnóstico Industrial</h2>
    <button id="btnMaestro" class="btn-standby">Conectar al Equipo</button>

    <div class="panel"><div class="led" id="ledSistema"></div><div class="info-container"><strong>Estatus IA:</strong><span class="dato" id="valSistema">---</span></div></div>
    <div class="panel"><div class="led" id="ledRed"></div><div class="info-container"><strong>WiFi / Nube:</strong><span class="dato" id="valRed">---</span></div></div>
    <div class="panel"><div class="led" id="ledCanal"></div><div class="info-container"><strong>Canal de Datos (Ping):</strong><span class="dato" id="valCanal">---</span></div></div>
    <div class="panel"><div class="led" id="ledLog"></div><div class="info-container"><strong>Último Envío WhatsApp:</strong><span class="dato" id="valLog">---</span></div></div>
    <div class="panel"><div class="led" id="ledTimer"></div><div class="info-container"><strong>Cronómetro de Reporte:</strong><span class="dato" id="valTimer">---</span></div></div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const CHARS = {
            'valSistema': '6e400002-b5a3-f393-e0a9-e50e24dcca9e',
            'valRed': '6e400003-b5a3-f393-e0a9-e50e24dcca9e',
            'valCanal': '6e400004-b5a3-f393-e0a9-e50e24dcca9e',
            'valLog': '6e400005-b5a3-f393-e0a9-e50e24dcca9e',
            'valTimer': '6e400006-b5a3-f393-e0a9-e50e24dcca9e'
        };

        let device;
        const decoder = new TextDecoder();

        function parseVisual(idTexto, texto) {
            const el = document.getElementById(idTexto);
            el.innerText = texto;
            const led = el.parentElement.parentElement.querySelector('.led');
            const str = texto.toUpperCase();
            led.className = "led";

            if (str.includes("[OK]") || str.includes("[EXITO]")) led.classList.add("led-verde");
            else if (str.includes("[FALLA]") || str.includes("[ABORTO]")) led.classList.add("led-rojo");
            else if (str.includes("[ESPERA]")) led.classList.add("led-amarillo");
            else if (str.includes("[TIMER]")) led.classList.add("led-azul");
        }

        document.getElementById('btnMaestro').addEventListener('click', async () => {
            if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
            try {
                device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                Object.keys(CHARS).forEach(async (id) => {
                    const char = await service.getCharacteristic(CHARS[id]);
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => parseVisual(id, decoder.decode(e.target.value)));
                    parseVisual(id, decoder.decode(await char.readValue()));
                });

                document.getElementById('btnMaestro').innerText = "⏹ Desconectar";
                document.getElementById('btnMaestro').className = "btn-conectado";
            } catch (e) { alert("Error: " + e); }
        });
    </script>
</body>
</html>
