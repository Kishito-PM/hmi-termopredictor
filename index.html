<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI TermoPredictor</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            padding: 20px; 
        }
        
        /* ESTADO POR DEFECTO (STANDBY - GRIS) */
        .panel { 
            background-color: #1e1e1e; 
            border-radius: 8px; 
            padding: 20px; 
            margin-top: 20px; 
            border-left: 5px solid #555555; /* Borde Gris */
            transition: border-left-color 0.3s;
        }
        .dato { 
            font-family: monospace; 
            color: #aaaaaa; /* Texto Gris */
            font-size: 1.2em; 
            display: block; 
            margin-top: 5px; 
            transition: color 0.3s;
        }
        button { 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* CLASES DINÁMICAS PARA LOS BOTONES */
        .btn-standby { background-color: #444444; color: #ffffff; }
        .btn-conectando { background-color: #00aaff; color: #ffffff; } /* Azul al conectar */
        .btn-conectado { background-color: #00ff88; color: #000000; }
        .btn-desconectado { background-color: #ff4444; color: #ffffff; }

        /* CLASES DINÁMICAS PARA PANELES Y TEXTOS (VERDE Y ROJO) */
        .panel-conectado { border-left-color: #00ff88; }
        .dato-conectado { color: #00ff88; }
        
        .panel-desconectado { border-left-color: #ff4444; }
        .dato-desconectado { color: #ff4444; }
    </style>
</head>
<body>

    <h2>⚡ Diagnóstico Industrial BLE</h2>
    <button id="btnConectar" class="btn-standby">Conectar al Equipo</button>

    <div class="panel" id="panelSistema">
        <strong>Sistema IA:</strong>
        <span class="dato" id="valSistema">Esperando vinculación...</span>
    </div>

    <div class="panel" id="panelRed">
        <strong>Estado de Red:</strong>
        <span class="dato" id="valRed">Esperando vinculación...</span>
    </div>

    <div class="panel" id="panelLog">
        <strong>Última Transmisión:</strong>
        <span class="dato" id="valLog">Esperando vinculación...</span>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_SISTEMA = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_RED     = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_LOG     = '6e400004-b5a3-f393-e0a9-e50e24dcca9e';

        let dispositivoBluetooth;

        // Función: Pinta la UI de Verde cuando la conexión es exitosa
        function marcarComoConectado() {
            const btn = document.getElementById('btnConectar');
            btn.innerText = "Conectado y Monitoreando";
            btn.className = "btn-conectado"; // Asigna clase CSS verde

            document.querySelectorAll('.panel').forEach(p => {
                p.classList.remove('panel-desconectado');
                p.classList.add('panel-conectado');
            });

            document.querySelectorAll('.dato').forEach(d => {
                d.classList.remove('dato-desconectado');
                d.classList.add('dato-conectado');
            });
        }

        // Función: Pinta la UI de Rojo cuando se cae la conexión
        function manejarDesconexion(event) {
            console.log("Conexión Bluetooth perdida.");
            
            const btn = document.getElementById('btnConectar');
            btn.innerText = "Conexión Perdida - Toca para Reconectar";
            btn.className = "btn-desconectado"; // Asigna clase CSS roja

            document.getElementById('valSistema').innerText = "--- ENLACE PERDIDO ---";
            document.getElementById('valRed').innerText = "--- ENLACE PERDIDO ---";
            document.getElementById('valLog').innerText = "--- ENLACE PERDIDO ---";

            document.querySelectorAll('.panel').forEach(p => {
                p.classList.remove('panel-conectado');
                p.classList.add('panel-desconectado');
            });

            document.querySelectorAll('.dato').forEach(d => {
                d.classList.remove('dato-conectado');
                d.classList.add('dato-desconectado');
            });
        }

        // Lógica principal al presionar el botón
        document.getElementById('btnConectar').addEventListener('click', async () => {
            try {
                if (dispositivoBluetooth && dispositivoBluetooth.gatt.connected) {
                    dispositivoBluetooth.gatt.disconnect();
                }

                // 1. Fase de Búsqueda
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                dispositivoBluetooth = device;
                dispositivoBluetooth.addEventListener('gattserverdisconnected', manejarDesconexion);

                // 2. Fase de Conexión (Botón se pone azul)
                const btn = document.getElementById('btnConectar');
                btn.innerText = "Negociando conexión...";
                btn.className = "btn-conectando";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                const charSistema = await service.getCharacteristic(CHAR_SISTEMA);
                const charRed = await service.getCharacteristic(CHAR_RED);
                const charLog = await service.getCharacteristic(CHAR_LOG);

                // 3. Suscripción a datos en vivo
                await charSistema.startNotifications();
                await charRed.startNotifications();
                await charLog.startNotifications();

                charSistema.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valSistema').innerText = new TextDecoder().decode(e.target.value);
                });
                charRed.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valRed').innerText = new TextDecoder().decode(e.target.value);
                });
                charLog.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valLog').innerText = new TextDecoder().decode(e.target.value);
                });

                document.getElementById('valSistema').innerText = new TextDecoder().decode(await charSistema.readValue());
                document.getElementById('valRed').innerText = new TextDecoder().decode(await charRed.readValue());
                document.getElementById('valLog').innerText = new TextDecoder().decode(await charLog.readValue());

                // 4. Éxito absoluto: Pintar de verde
                marcarComoConectado();

            } catch (error) {
                console.error("Error de conexión:", error);
                
                if (error.name !== 'NotFoundError') {
                    alert("Falla de enlace: " + error.message);
                }
                
                // Si falla la conexión, poner rojo el botón
                const btn = document.getElementById('btnConectar');
                btn.innerText = "Error - Reintentar Conexión";
                btn.className = "btn-desconectado";
            }
        });
    </script>
</body>
</html>
