<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI TermoPredictor</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            padding: 20px; 
        }
        .panel { 
            background-color: #1e1e1e; 
            border-radius: 8px; 
            padding: 20px; 
            margin-top: 20px; 
            border-left: 5px solid #00ff88; 
            transition: border-left-color 0.3s;
        }
        button { 
            background-color: #00ff88; 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: background-color 0.3s;
        }
        .dato { 
            font-family: monospace; 
            color: #00ff88; 
            font-size: 1.2em; 
            display: block; 
            margin-top: 5px; 
        }
        /* Clases CSS para el estado de desconexión */
        .panel-desconectado { border-left-color: #ff4444; }
        .dato-desconectado { color: #ff4444; }
    </style>
</head>
<body>

    <h2>⚡ Diagnóstico Industrial BLE</h2>
    <button id="btnConectar">Conectar al Equipo</button>

    <div class="panel" id="panelSistema">
        <strong>Sistema IA:</strong>
        <span class="dato" id="valSistema">Esperando conexión...</span>
    </div>

    <div class="panel" id="panelRed">
        <strong>Estado de Red:</strong>
        <span class="dato" id="valRed">Esperando conexión...</span>
    </div>

    <div class="panel" id="panelLog">
        <strong>Última Transmisión:</strong>
        <span class="dato" id="valLog">Esperando conexión...</span>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_SISTEMA = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_RED     = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_LOG     = '6e400004-b5a3-f393-e0a9-e50e24dcca9e';

        let dispositivoBluetooth;

        // Función que se dispara cuando se pierde la conexión
        function manejarDesconexion(event) {
            console.log("Conexión Bluetooth perdida.");
            
            // Cambiar aspecto del botón
            const btn = document.getElementById('btnConectar');
            btn.innerText = "Conexión Perdida - Toca para Reconectar";
            btn.style.backgroundColor = "#ff4444";
            btn.style.color = "#ffffff";

            // Actualizar textos a estado de error
            document.getElementById('valSistema').innerText = "--- ENLACE PERDIDO ---";
            document.getElementById('valRed').innerText = "--- ENLACE PERDIDO ---";
            document.getElementById('valLog').innerText = "--- ENLACE PERDIDO ---";

            // Cambiar colores de los paneles a rojo
            const paneles = document.querySelectorAll('.panel');
            const datos = document.querySelectorAll('.dato');
            paneles.forEach(p => p.classList.add('panel-desconectado'));
            datos.forEach(d => d.classList.add('dato-desconectado'));
        }

        // Función para restaurar los colores al conectar
        function restaurarUI() {
            const paneles = document.querySelectorAll('.panel');
            const datos = document.querySelectorAll('.dato');
            paneles.forEach(p => p.classList.remove('panel-desconectado'));
            datos.forEach(d => d.classList.remove('dato-desconectado'));
            
            const btn = document.getElementById('btnConectar');
            btn.style.backgroundColor = "#555";
            btn.style.color = "#00ff88";
        }

        document.getElementById('btnConectar').addEventListener('click', async () => {
            try {
                // Si ya había un dispositivo conectado, nos aseguramos de limpiarlo
                if (dispositivoBluetooth && dispositivoBluetooth.gatt.connected) {
                    dispositivoBluetooth.gatt.disconnect();
                }

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                dispositivoBluetooth = device;

                // ** AQUI AGREGAMOS EL DETECTOR DE DESCONEXIÓN **
                dispositivoBluetooth.addEventListener('gattserverdisconnected', manejarDesconexion);

                document.getElementById('btnConectar').innerText = "Conectando...";
                document.getElementById('btnConectar').style.backgroundColor = "#00ff88";
                document.getElementById('btnConectar').style.color = "#000";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                const charSistema = await service.getCharacteristic(CHAR_SISTEMA);
                const charRed = await service.getCharacteristic(CHAR_RED);
                const charLog = await service.getCharacteristic(CHAR_LOG);

                await charSistema.startNotifications();
                await charRed.startNotifications();
                await charLog.startNotifications();

                charSistema.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valSistema').innerText = new TextDecoder().decode(e.target.value);
                });
                charRed.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valRed').innerText = new TextDecoder().decode(e.target.value);
                });
                charLog.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valLog').innerText = new TextDecoder().decode(e.target.value);
                });

                // Leer valores iniciales
                document.getElementById('valSistema').innerText = new TextDecoder().decode(await charSistema.readValue());
                document.getElementById('valRed').innerText = new TextDecoder().decode(await charRed.readValue());
                document.getElementById('valLog').innerText = new TextDecoder().decode(await charLog.readValue());

                document.getElementById('btnConectar').innerText = "Conectado y Monitoreando";
                restaurarUI();

            } catch (error) {
                console.error("Error de conexión:", error);
                
                // Solo mostrar alerta si no fue el usuario quien canceló el menú de emparejamiento
                if (error.name !== 'NotFoundError') {
                    alert("Error de conexión: " + error.message);
                }
                
                document.getElementById('btnConectar').innerText = "Reintentar Conexión";
                document.getElementById('btnConectar').style.backgroundColor = "#ff4444";
                document.getElementById('btnConectar').style.color = "#ffffff";
            }
        });
    </script>
</body>
</html>
