<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI TermoPredictor</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            padding: 20px; 
        }
        
        /* ESTADO POR DEFECTO (STANDBY) */
        .panel { 
            background-color: #1e1e1e; 
            border-radius: 8px; 
            padding: 20px; 
            margin-top: 20px; 
            border-left: 5px solid #555555; 
            transition: all 0.3s ease;
        }
        .dato { 
            font-family: monospace; 
            color: #aaaaaa; 
            font-size: 1.2em; 
            display: block; 
            margin-top: 5px; 
            transition: color 0.3s;
        }
        button { 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ANIMACIÓN DE RESPIRACIÓN (COMO EL LED DE PARTICLE) */
        @keyframes respiracionViva {
            0% { 
                border-left-color: #00ff88; 
                box-shadow: -5px 0 15px -5px rgba(0, 255, 136, 0.1); 
            }
            50% { 
                border-left-color: #006633; 
                box-shadow: -5px 0 25px -5px rgba(0, 255, 136, 0.6); 
            }
            100% { 
                border-left-color: #00ff88; 
                box-shadow: -5px 0 15px -5px rgba(0, 255, 136, 0.1); 
            }
        }

        /* CLASES DINÁMICAS PARA LOS BOTONES */
        .btn-standby { background-color: #444444; color: #ffffff; }
        .btn-conectando { background-color: #00aaff; color: #ffffff; cursor: wait; }
        .btn-desconectar { background-color: #2a2a2a; color: #ff4444; border: 1px solid #ff4444; }
        .btn-desconectar:hover { background-color: #ff4444; color: #ffffff; }
        .btn-error { background-color: #ff4444; color: #ffffff; }

        /* CLASES DINÁMICAS PARA PANELES Y TEXTOS */
        .panel-conectado { 
            animation: respiracionViva 3s infinite ease-in-out; 
        }
        .dato-conectado { color: #00ff88; }
        
        .panel-desconectado { border-left-color: #ff4444; box-shadow: none; animation: none; }
        .dato-desconectado { color: #ff4444; }
    </style>
</head>
<body>

    <h2>⚡ Diagnóstico Industrial BLE</h2>
    
    <button id="btnMaestro" class="btn-standby">Conectar al Equipo</button>

    <div class="panel" id="panelSistema">
        <strong>Sistema IA:</strong>
        <span class="dato" id="valSistema">Esperando vinculación...</span>
    </div>

    <div class="panel" id="panelRed">
        <strong>Estado de Red:</strong>
        <span class="dato" id="valRed">Esperando vinculación...</span>
    </div>

    <div class="panel" id="panelLog">
        <strong>Última Transmisión:</strong>
        <span class="dato" id="valLog">Esperando vinculación...</span>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_SISTEMA = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_RED     = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
        const CHAR_LOG     = '6e400004-b5a3-f393-e0a9-e50e24dcca9e';

        let dispositivoBluetooth;

        // Función: UI cuando está conectado y transmitiendo
        function UI_Conectado() {
            const btn = document.getElementById('btnMaestro');
            btn.innerHTML = "⏹ Desconectar Equipo";
            btn.className = "btn-desconectar";

            document.querySelectorAll('.panel').forEach(p => {
                p.classList.remove('panel-desconectado');
                p.classList.add('panel-conectado'); // Activa la animación de respiración
            });

            document.querySelectorAll('.dato').forEach(d => {
                d.classList.remove('dato-desconectado');
                d.classList.add('dato-conectado');
            });
        }

        // Función: UI cuando el enlace se rompe o se desconecta intencionalmente
        function UI_Desconectado(mensajeBoton = "Conectar al Equipo", esError = false) {
            const btn = document.getElementById('btnMaestro');
            btn.innerHTML = mensajeBoton;
            btn.className = esError ? "btn-error" : "btn-standby";

            document.getElementById('valSistema').innerText = "--- ENLACE CERRADO ---";
            document.getElementById('valRed').innerText = "--- ENLACE CERRADO ---";
            document.getElementById('valLog').innerText = "--- ENLACE CERRADO ---";

            document.querySelectorAll('.panel').forEach(p => {
                p.classList.remove('panel-conectado');
                p.classList.add('panel-desconectado'); // Detiene animación, pone rojo
            });

            document.querySelectorAll('.dato').forEach(d => {
                d.classList.remove('dato-conectado');
                d.classList.add('dato-desconectado');
            });
        }

        // Evento que salta si el equipo se apaga o el usuario se aleja
        function manejarCaidaDeRed(event) {
            console.log("Conexión Bluetooth rota físicamente.");
            UI_Desconectado("Conexión Perdida - Reconectar", true);
        }

        // Lógica del Botón Maestro (Toggle: Conecta y Desconecta)
        document.getElementById('btnMaestro').addEventListener('click', async () => {
            
            // 1. SI YA ESTÁ CONECTADO -> EJECUTAMOS DESCONEXIÓN MANUAL
            if (dispositivoBluetooth && dispositivoBluetooth.gatt.connected) {
                console.log("Desconectando a petición del usuario...");
                dispositivoBluetooth.gatt.disconnect();
                UI_Desconectado("Conectar al Equipo", false); // Volvemos a estado neutral
                return; // Salimos de la función, no intentamos conectar
            }

            // 2. SI NO ESTÁ CONECTADO -> INICIAMOS PROTOCOLO DE CONEXIÓN
            try {
                // Pedimos el dispositivo
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                dispositivoBluetooth = device;
                dispositivoBluetooth.addEventListener('gattserverdisconnected', manejarCaidaDeRed);

                // Cambiamos UI a fase de negociación
                const btn = document.getElementById('btnMaestro');
                btn.innerHTML = "⏳ Negociando enlace...";
                btn.className = "btn-conectando";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                const charSistema = await service.getCharacteristic(CHAR_SISTEMA);
                const charRed = await service.getCharacteristic(CHAR_RED);
                const charLog = await service.getCharacteristic(CHAR_LOG);

                await charSistema.startNotifications();
                await charRed.startNotifications();
                await charLog.startNotifications();

                // Callbacks para actualización en tiempo real
                charSistema.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valSistema').innerText = new TextDecoder().decode(e.target.value);
                });
                charRed.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valRed').innerText = new TextDecoder().decode(e.target.value);
                });
                charLog.addEventListener('characteristicvaluechanged', (e) => {
                    document.getElementById('valLog').innerText = new TextDecoder().decode(e.target.value);
                });

                // Lectura inicial del buffer
                document.getElementById('valSistema').innerText = new TextDecoder().decode(await charSistema.readValue());
                document.getElementById('valRed').innerText = new TextDecoder().decode(await charRed.readValue());
                document.getElementById('valLog').innerText = new TextDecoder().decode(await charLog.readValue());

                // Éxito: Activamos la interfaz de monitoreo vivo
                UI_Conectado();

            } catch (error) {
                console.error("Fallo de negociación BLE:", error);
                
                if (error.name !== 'NotFoundError') {
                    alert("Falla de enlace: " + error.message);
                }
                
                UI_Desconectado("Error - Reintentar Conexión", true);
            }
        });
    </script>
</body>
</html>
